name: Send Weather to Slack

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours (UTC)
  workflow_dispatch:

jobs:
  send-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run weather script
        id: weather
        env: 
          WEATHERAPI_KEY: ${{ secrets.WEATHERAPI_KEY }}
        run: |
          output=$(node index.js)
          
          echo "data<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send data to Slack
        run: |
          formatted=$(echo '${{ steps.weather.outputs.data }}' | jq -r '
            "🌦 *Rain Forecast Update*\n" +
            (map(
              "• \(.location) (" + .localTime + ")\n" +
              (if .willItRain 
                then "   🌧 Rain expected (" + (.chanceOfRainPercent|tostring) + "%, " + (.precipMm|tostring) + " mm)"
                else "   ☀️ No rain expected"
              end)
            ) | join("\n"))
          ')

          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"$formatted\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
